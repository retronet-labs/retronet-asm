name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: Build, vet e test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          check-latest: true

      - name: Verifica formattazione (gofmt)
        run: |
          non_formattati="$(gofmt -l .)"
          if [ -n "$non_formattati" ]; then
            echo "File non formattati:"
            echo "$non_formattati"
            exit 1
          fi

      - name: Analisi statica (go vet)
        run: go vet ./...

      - name: Test
        run: go test -count=1 -v ./...
